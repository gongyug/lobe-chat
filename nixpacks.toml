# Nixpacks configuration for Railway deployment
# Forces Railway to treat monorepo as SINGLE service

[phases.setup]
nixPkgs = ["nodejs_20", "pnpm"]

[phases.install]
# Use monorepo-aware install
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
# Build from root directory
cmds = ["pnpm run build"]

[start]
cmd = "pnpm start"

[variables]
SKIP_ENV_VALIDATION = "1"

# Override package.json detection to prevent multi-service
[providers]
pnpm = { version = "9.x" }
